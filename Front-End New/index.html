<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BitHub — Your one-stop academic resource hub for Birla Institute of Technology. Select your campus to access course materials, notes, and more." />
    <meta name="theme-color" content="#4A0E0E" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>BitHub — Select Your Campus</title>
    <!-- KaTeX loaded via CDN to completely bypass Vite tree-shaking issues -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsRQf1u03Z+IeG2z0/F/L9x6kO79X5u/UymX/Z/6HqXwU/l+9LzF5Pz6" crossorigin="anonymous">
    <!-- Corrected JS Integrity Hash -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    
    <!-- Automated KaTeX Verification Measure -->
    <script>
      window.addEventListener('load', function() {
        if (typeof window.katex === 'undefined') {
          console.error("KaTeX failed to load from CDN! Please check SRI integrity hashes or network connectivity.");
          var errorBanner = document.createElement('div');
          errorBanner.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#c65575;color:white;padding:15px;border-radius:5px;z-index:9999;font-weight:bold;box-shadow:0 4px 6px rgba(0,0,0,0.3);';
          errorBanner.innerText = 'KaTeX Failed to Load (SRI Hash Mismatch / Blocked by Browser)';
          document.body.appendChild(errorBanner);
        } else {
          console.log("KaTeX successfully loaded from CDN!");
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
